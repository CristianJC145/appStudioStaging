services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      # Calibraciones de voz y configuraciones de usuarios
      - medi_data:/app/data
      # Caché unificada para modelos de WhisperX, PyTorch y HuggingFace
      # Evita la descarga masiva en cada redeploy
      - ai_models_cache:/root/.cache
    restart: unless-stopped

volumes:
  medi_data:
    driver: local
  ai_models_cache:
    driver: local